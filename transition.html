<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Transition</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            width:100vw;
            height:100vh;

            overflow:hidden;

            background:white;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:
                Helvetica,
                Arial,
                sans-serif;

        }

        .transition-container{

            position:relative;

            width:100%;
            height:100%;

            display:flex;
            justify-content:center;
            align-items:center;

        }

        .title{

            position:absolute;

            font-size:1.4rem;

            letter-spacing:0.45em;

            color:black;

            opacity:0;

            transform:
                translateY(20px);

            animation:
                textAppear 5s ease forwards;

        }

        @keyframes textAppear{

            0%{

                opacity:0;
                transform:translateY(30px);

            }

            20%{

                opacity:1;
                transform:translateY(0px);

            }

            75%{

                opacity:1;
                transform:translateY(0px);

            }

            100%{

                opacity:0;
                transform:translateY(-20px);

            }

        }

        .white-overlay{

            position:absolute;

            inset:0;

            background:white;

            animation:
                overlayFade 5.5s ease forwards;

        }

        @keyframes overlayFade{

            0%{

                opacity:1;

            }

            80%{

                opacity:1;

            }

            100%{

                opacity:0;

            }

        }

    </style>

</head>

<body>

    <div class="transition-container">

        <div class="white-overlay"></div>

        <div class="title">
            KENT EXHIBITION 2026
        </div>

    </div>

    <script>

        setTimeout(() => {

            window.location.href = "gallery.html";

        }, 5500);

    </script>

</body>

</html>
