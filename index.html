<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>WHITE GARDEN GALLERY</title>

    <!-- GOOGLE FONT -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=Fraunces:opsz,wght@9..144,200;9..144,300&display=swap"
        rel="stylesheet">

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;

            cursor:none;

        }

        html,
        body{

            width:100%;
            height:100%;

            overflow:hidden;

            background:#ebe6de;

        }

        /* ========================================== */
        /* HERO */
        /* ========================================== */

        #hero-container{

            position:relative;

            width:100vw;
            height:100vh;

            overflow:hidden;

        }

        /* background image */

        .background-image{

            position:absolute;

            inset:0;

            background-image:url("artworks/white-garden-texture.png");

            background-size:cover;
            background-position:center;

            filter:
            saturate(0.82)
            contrast(1.04)
            brightness(0.96);

            z-index:1;

        }

        /* reveal layer */

        #paintLayer{

            position:absolute;

            inset:0;

            width:100%;
            height:100%;

            z-index:2;

        }

        /* ========================================== */
        /* CENTER CONTENT */
        /* ========================================== */

        .center-content{

            position:absolute;

            top:50%;
            left:50%;

            transform:translate(-50%,-50%);

            z-index:10;

            display:flex;

            flex-direction:column;

            align-items:center;

            text-align:center;

            pointer-events:none;

            color:#2A2820;

        }

        .year{

            font-family:'DM Sans', sans-serif;

            font-size:13px;

            letter-spacing:0.35em;

            text-transform:uppercase;

            margin-bottom:2vh;

            opacity:0.65;

        }

        h1{

            font-family:'Fraunces', serif;

            font-size:5.2vw;

            line-height:1.05;

            font-weight:300;

            letter-spacing:0.04em;

            text-transform:uppercase;

            margin-bottom:3vh;

        }

        .subtitle{

            font-family:'DM Sans', sans-serif;

            font-size:12px;

            letter-spacing:0.35em;

            text-transform:uppercase;

            opacity:0.7;

            margin-bottom:5vh;

        }

        /* ========================================== */
        /* BUTTON */
        /* ========================================== */

        #enterBtn{

            pointer-events:auto;

            padding:
            14px
            34px;

            border:1px solid rgba(42,40,32,0.25);

            background:rgba(255,255,255,0.2);

            backdrop-filter:blur(12px);

            font-family:'DM Sans', sans-serif;

            font-size:11px;

            letter-spacing:0.35em;

            text-transform:uppercase;

            color:#2A2820;

            transition:0.5s ease;

        }

        #enterBtn:hover{

            background:#2A2820;

            color:#ebe6de;

            transform:translateY(-2px);

        }

        /* ========================================== */
        /* CURSORS */
        /* ========================================== */

        .star-cursor{

            position:absolute;

            width:10px;
            height:10px;

            background:rgba(255,255,255,0.9);

            border-radius:50%;

            transform:translate(-50%,-50%);

            pointer-events:none;

            z-index:30;

            box-shadow:
            0 0 30px rgba(255,255,255,0.25);

        }

        .ghost-cursor{

            position:absolute;

            width:6px;
            height:6px;

            background:rgba(255,255,255,0.5);

            border-radius:50%;

            transform:translate(-50%,-50%);

            pointer-events:none;

            z-index:30;

            box-shadow:
            0 0 24px rgba(255,255,255,0.12);

        }

        /* ========================================== */
        /* NOISE */
        /* ========================================== */

        .noise{

            position:fixed;

            inset:0;

            background-image:url("https://grainy-gradients.vercel.app/noise.svg");

            opacity:0.045;

            mix-blend-mode:multiply;

            pointer-events:none;

            z-index:999;

        }

        /* ========================================== */
        /* MOBILE */
        /* ========================================== */

        @media screen and (max-width:700px){

            h1{

                font-size:16vw;

            }

            .subtitle{

                font-size:10px;

            }

        }

    </style>

</head>

<body>

<div id="hero-container">

    <!-- IMAGE -->

    <div class="background-image"></div>

    <!-- REVEAL CANVAS -->

    <canvas id="paintLayer"></canvas>

    <!-- UI -->

    <div class="center-content">

        <p class="year">
            2026
        </p>

        <h1>

            WHITE<br>
            GARDEN

        </h1>

        <p class="subtitle">

            EXHIBITION : GALLERY

        </p>

        <button id="enterBtn">

            ENTER

        </button>

    </div>

    <!-- CURSORS -->

    <div id="user-star"
        class="star-cursor">

    </div>

    <div id="ghost-star"
        class="ghost-cursor">

    </div>

</div>

<!-- NOISE -->

<div class="noise"></div>

<script>

const canvas = document.getElementById('paintLayer');

const ctx = canvas.getContext('2d');

const userStar = document.getElementById('user-star');

const ghostStar = document.getElementById('ghost-star');

let width, height;

const BASE_COLOR = '#EBE6DE';

const FADE_COLOR = 'rgba(235,230,222,0.016)';

let mouseX = -1000;
let mouseY = -1000;

/* ghost */

let ghost = {

    x:window.innerWidth/2,
    y:window.innerHeight/2,

    angle:Math.random()*Math.PI*2

};

/* resize */

function resizeCanvas(){

    width = window.innerWidth;
    height = window.innerHeight;

    canvas.width = width;
    canvas.height = height;

    ctx.fillStyle = BASE_COLOR;

    ctx.fillRect(0,0,width,height);

}

window.addEventListener('resize', resizeCanvas);

resizeCanvas();

/* mouse */

window.addEventListener('mousemove',(e)=>{

    mouseX = e.clientX;
    mouseY = e.clientY;

    userStar.style.left = mouseX + 'px';
    userStar.style.top = mouseY + 'px';

});

/* animation */

function animate(){

    requestAnimationFrame(animate);

    ctx.globalCompositeOperation = 'source-over';

    ctx.fillStyle = FADE_COLOR;

    ctx.fillRect(0,0,width,height);

    ctx.globalCompositeOperation = 'destination-out';

    /* USER */

    if(mouseX !== -1000){

        let grad = ctx.createRadialGradient(

            mouseX,
            mouseY,
            0,

            mouseX,
            mouseY,
            170

        );

        grad.addColorStop(0,'rgba(255,255,255,1)');
        grad.addColorStop(0.45,'rgba(255,255,255,0.72)');
        grad.addColorStop(1,'rgba(255,255,255,0)');

        ctx.fillStyle = grad;

        ctx.beginPath();

        ctx.arc(mouseX,mouseY,170,0,Math.PI*2);

        ctx.fill();

    }

    /* GHOST */

    ghost.angle += (Math.random()-0.5)*0.18;

    ghost.x += Math.cos(ghost.angle)*4.8;

    ghost.y += Math.sin(ghost.angle)*4.8;

    if(ghost.x < 0 || ghost.x > width){

        ghost.angle = Math.PI - ghost.angle;

    }

    if(ghost.y < 0 || ghost.y > height){

        ghost.angle = -ghost.angle;

    }

    ghostStar.style.left = ghost.x + 'px';

    ghostStar.style.top = ghost.y + 'px';

    let ghostGrad = ctx.createRadialGradient(

        ghost.x,
        ghost.y,
        0,

        ghost.x,
        ghost.y,
        80

    );

    ghostGrad.addColorStop(0,'rgba(255,255,255,0.85)');
    ghostGrad.addColorStop(1,'rgba(255,255,255,0)');

    ctx.fillStyle = ghostGrad;

    ctx.beginPath();

    ctx.arc(ghost.x,ghost.y,80,0,Math.PI*2);

    ctx.fill();

}

animate();

/* ENTER */

document.getElementById("enterBtn")

.addEventListener("click",()=>{

    document.body.style.transition =
    "opacity 1.4s ease";

    document.body.style.opacity = "0";

    setTimeout(()=>{

        window.location.href = "gallery.html";

    },1400);

});

</script>

</body>

</html>
